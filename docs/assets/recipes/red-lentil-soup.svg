  <rect width="1200" height="630" fill="url(#g)"/>

  <g filter="url(#shadow)">
    <rect x="70" y="110" width="1060" height="410" rx="28" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.25)"/>
