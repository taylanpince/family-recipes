  <text x="120" y="420" font-size="28" font-family="ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, Helvetica, Arial" fill="rgba(255,255,255,0.85)">kaizenmusings.com/family-recipes</text>
